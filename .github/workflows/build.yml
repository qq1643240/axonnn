name: Build Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget perl clang lld llvm \
            libxml2-dev libssl-dev zlib1g-dev dpkg-dev unzip xz-utils \
            libbz2-dev liblzma-dev fakeroot rsync sed grep lzma-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Install iOS SDK
        run: |
          set -e
          cd $THEOS/sdks
          echo "Current SDKs:"
          ls -la
          if [ -z "$(ls -A *.sdk 2>/dev/null)" ]; then
            echo "No SDKs found, cloning..."
            git clone --depth 1 https://github.com/theos/sdks.git tmp_sdks
            mv tmp_sdks/*.sdk .
            rm -rf tmp_sdks
          fi
          echo "Final SDKs:"
          ls -la
          
      - name: Build Package
        run: |
          make clean
          make package FINALPACKAGE=1 THEOS="$HOME/theos" 2>&1 | tee build.log
          
      - name: Print build log on failure
        if: failure()
        run: |
          cat build.log
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axon-deb
          path: ./packages/*.deb
          
      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.5-build
          name: Axon v1.5 Build
          body: Automated build from commit ${{ github.sha }}
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget perl clang lld llvm \
            libxml2-dev libssl-dev zlib1g-dev dpkg-dev unzip xz-utils \
            libbz2-dev liblzma-dev fakeroot rsync sed grep lzma-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Install iOS SDK
        run: |
          set -e
          cd $THEOS/sdks
          echo "Current SDKs:"
          ls -la
          if [ -z "$(ls -A *.sdk 2>/dev/null)" ]; then
            echo "No SDKs found, cloning..."
            git clone --depth 1 https://github.com/theos/sdks.git tmp_sdks
            mv tmp_sdks/*.sdk .
            rm -rf tmp_sdks
          fi
          echo "Final SDKs:"
          ls -la
          
      - name: Build Package
        run: |
          echo "THEOS=$THEOS"
          echo "HOME=$HOME"
          ls -la $THEOS/
          make clean THEOS="$THEOS"
          make package FINALPACKAGE=1 THEOS="$THEOS" 2>&1 | tee build.log
          echo "Build complete, listing all files:"
          find . -name "*.deb" -type f 2>/dev/null
          find $THEOS -name "*.deb" -type f 2>/dev/null
          ls -la packages/ 2>/dev/null || echo "packages directory not found"
          ls -la .theos/packages/ 2>/dev/null || echo ".theos/packages directory not found"
          
      - name: Print build log on failure
        if: always()
        run: |
          echo "## Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axon-deb
          path: ./packages/*.deb
          
      - name: List packages
        run: |
          ls -la packages/
          echo "DEB files:"
          ls packages/*.deb
          
      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.5-build-${{ github.run_number }}
          name: Axon v1.5 Build #${{ github.run_number }}
          body: Automated build from commit ${{ github.sha }}
          files: |
            packages/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: /home/runner/theos

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl perl clang lld llvm \
            libxml2-dev libssl-dev zlib1g-dev dpkg-dev unzip wget
          
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
      - name: Download iOS SDK
        run: |
          cd $THEOS/sdks
          wget -q https://github.com/theos/sdks/releases/download/16.2/iOS16.2.sdk.tar.xz
          tar -xf iOS16.2.sdk.tar.xz
          rm iOS16.2.sdk.tar.xz
          ls -la
          
      - name: Install ldid
        run: |
          cd $THEOS/bin
          wget -q -O ldid https://github.com/theos/ldid/releases/download/v2.1.5-procur/ldid_linux_x86_64
          chmod +x ldid
          
      - name: Build Package
        run: |
          export PATH="$THEOS/bin:$PATH"
          make clean
          make package FINALPACKAGE=1 VERBOSE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axon-deb
          path: ./packages/*.deb